name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/build.log

      - name: Show compilation errors
        if: failure()
        run: |
          echo "=== Kotlin errors ==="
          grep -E "^e:" /tmp/build.log || true
          echo "=== Last 80 lines ==="
          tail -80 /tmp/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ImageCleaner-debug
          path: app/build/outputs/apk/debug/*.apk
